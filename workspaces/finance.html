<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llumen Prototype</title>
    <!-- Shared Llumen styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/tailwind.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="ll-page-container">
        <header class="ll-header ll-app-header" data-ll-app-header-host></header>

        <nav id="app-nav-bar" class="ll-header ll-app-header-secondary ll-header--hide-with-scroll" data-ll-app-nav-host data-selected-nav-id="finance"></nav>

        <div class="workspace-header body-bg-color px-4 py-3 md:px-8 md:py-6 pb-0 md:pb-0 border-b border-gray-800">

            <div class="flex items-center justify-between mb-4 space-x-6">
                <div class="flex items-center space-x-4">
                    <h2 class="flex items-center text-xl md:text-2xl font-bold text-white">
                        <span class="material-symbols-outlined mr-3 text-[24px]">workspaces</span>
                        Finance
                    </h2>
                    <span class="ll-chip ll-chip--outline-default">
                        <span class="material-symbols-outlined ll-chip__icon">lock</span>
                        <span class="ll-chip__label">Private</span>
                    </span>
                </div>
                <div class="flex items-center space-x-4">
                    <button type="button"
                        class="ll-btn ll-btn--outline-default ll-btn--sm"
                        onclick="openWorkspaceConfigModal('members')">
                        <span class="material-symbols-outlined ll-btn__icon ml-0">people</span>
                        26
                    </button>
                    <div class="relative">
                        <button id="database-actions-dropdown-btn" type="button" class="ll-icon-btn ll-icon-btn--circle ll-icon-btn--outline" aria-label="Workspace actions">
                            <span class="material-symbols-outlined ll-icon-btn__icon">more_vert</span>
                        </button>
                        <div id="database-actions-dropdown-menu" class="ll-dropdown__menu hidden">
                            <button type="button" class="ll-dropdown__item" data-value="workspace-info"
                                onclick="openWorkspaceConfigModal()">Workspace Info</button>
                            <button type="button" class="ll-dropdown__item" data-value="members"
                                onclick="openWorkspaceConfigModal('members')">Members</button>
                            <button type="button" class="ll-dropdown__item" data-value="settings"
                                onclick="openWorkspaceConfigModal('settings')">Settings</button>
                            <button type="button" class="ll-dropdown__item" data-value="components"
                                onclick="openWorkspaceConfigModal('components')">Components</button>
                            <button type="button" class="ll-dropdown__item" data-value="filters"
                                onclick="openWorkspaceConfigModal('filters')">Filters</button>
                            <button type="button" class="ll-dropdown__item" data-value="data-sources"
                                onclick="openWorkspaceConfigModal('data-sources')">Data Sources</button>
                            <button type="button" class="ll-dropdown__item ll-text-negative" data-value="archive-workspace">Archive Workspace</button>
                        </div>
                    </div>
                </div>
            </div>

            <nav id="finance-workspace-tabs" class="ll-tab-nav">
                <button class="internal-tab-item ll-tab-btn ll-active"
                    data-internal-tab="overview">Overview</button>
                <button class="internal-tab-item ll-tab-btn"
                    data-internal-tab="briefings">Briefings</button>
                <button class="internal-tab-item ll-tab-btn"
                    data-internal-tab="stories">Stories</button>
                <button class="internal-tab-item ll-tab-btn"
                    data-internal-tab="dashboards">Dashboards</button>
                <button class="internal-tab-item ll-tab-btn"
                    data-internal-tab="whiteboards">Whiteboards</button>
                <button class="internal-tab-item ll-tab-btn"
                    data-internal-tab="command-rooms">Command Rooms</button>
                <button class="internal-tab-item ll-tab-btn"
                    data-internal-tab="workflows">Workflows</button>
            </nav>

        </div>

        <main class="ll-page-layout">
            
            <div class="ll-page-content-outer">
                <div class="ll-page-content-inner ll-page-content-inner--no-x-padding ll-page-content-inner--no-t-padding">

                    <div id="overview-tab-content" class="workspace-tab-content ll-tab-panel">
                        <div id="finance-overview-v2" class="pt-3 md:pt-6">
                            <section class="ll-section">
                                <div class="ll-section-header">
                                    <h2 class="ll-section-heading">Latest Briefings</h2>
                                    <div class="flex items-center space-x-4">
                                        <button type="button" id="finance-overview-create-briefing-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Briefing
                                        </button>
                                        <button type="button" class="ll-btn ll-btn--outline-default" data-internal-tab="briefings">
                                            <span class="material-symbols-outlined ll-btn__icon">visibility</span>
                                            All Briefings
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-section-content ll-section-content--no-x-padding">
                                    <div id="finance-overview-briefings-carousel-root" class="ll-carousel briefings-carousel"></div>
                                </div>
                            </section>

                            <section class="ll-section" >
                                <div class="ll-section-header">
                                    <h2 class="ll-section-heading">Latest Stories</h2>
                                    <div class="flex items-center space-x-4">
                                        <button type="button" id="finance-overview-create-story-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Story
                                        </button>
                                        <button type="button" class="ll-btn ll-btn--outline-default" data-internal-tab="stories">
                                            <span class="material-symbols-outlined ll-btn__icon">visibility</span>
                                            All Stories
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-section-content ll-section-content--no-x-padding">
                                    <div id="finance-overview-stories-carousel-root" class="ll-carousel"></div>
                                </div>
                            </section>

                            <section class="ll-section" >
                                <div class="ll-section-header">
                                    <h2 class="ll-section-heading">Latest Dashboards</h2>
                                    <div class="flex items-center space-x-4">
                                        <button type="button" id="finance-overview-create-dashboard-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Dashboard
                                        </button>
                                        <button type="button" class="ll-btn ll-btn--outline-default" data-internal-tab="dashboards">
                                            <span class="material-symbols-outlined ll-btn__icon">visibility</span>
                                            All Dashboards
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-section-content ll-section-content--no-x-padding">
                                    <div id="finance-overview-dashboards-carousel-root" class="ll-carousel"></div>
                                </div>
                            </section>

                            <section class="ll-section">
                                <div class="ll-section-header">
                                    <h2 class="ll-section-heading">Latest Whiteboards</h2>
                                    <div class="flex items-center space-x-4">
                                        <button type="button" id="finance-overview-create-whiteboard-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Whiteboard
                                        </button>
                                        <button type="button" class="ll-btn ll-btn--outline-default" data-internal-tab="whiteboards">
                                            <span class="material-symbols-outlined ll-btn__icon">visibility</span>
                                            All Whiteboards
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-section-content ll-section-content--no-x-padding">
                                    <div id="finance-overview-whiteboards-carousel-root" class="ll-carousel"></div>
                                </div>
                            </section>
                        </div>

                    </div>

                    <div id="briefings-tab-content" class="workspace-tab-content ll-tab-panel hidden">
                        <div id="finance-briefings-v3" class="ll-listing-module">
                            <div class="ll-listing-module-header">
                                <div class="ll-listing-module-header__top">
                                    <div class="ll-listing-module-header__title-wrap">
                                        <div class="ll-listing-module-header__title">Briefings</div>
                                    </div>
                                    <div class="ll-listing-module-header__actions">
                                        <div class="ll-input-with-left-icon ll-listing-module-search-input">
                                            <div class="ll-input-with-left-icon__left ll-input-with-left-icon__icon">
                                                <span class="material-symbols-outlined">search</span>
                                            </div>
                                            <input id="finance-briefings-v3-search-input" type="text" class="ll-input ll-input--search ll-input-with-left-icon__input" placeholder="Search briefings...">
                                        </div>
                                        <button id="finance-briefings-v3-create-btn" type="button" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Create Briefing
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-listing-module-header__toolbar">
                                    <div class="ll-listing-module-header__toolbar-start">
                                        <div class="ll-btn-group" role="group" aria-label="Briefing state toggle">
                                            <button id="finance-briefings-v3-state-active-btn" type="button" class="ll-btn ll-btn--outline-default">Active</button>
                                            <button id="finance-briefings-v3-state-expired-btn" type="button" class="ll-btn ll-btn--outline-default">Expired</button>
                                        </div>
                                        <button id="finance-briefings-v3-type-filter-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Type</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-briefings-v3-type-filter-menu" class="ll-dropdown__menu hidden"></div>
                                        <button id="finance-briefings-v3-clear-filters-btn" type="button" class="ll-btn ll-btn--outline-negative ll-listing-module__clear-filters hidden">Clear All Filters</button>
                                    </div>
                                    <div class="ll-listing-module-header__toolbar-end">
                                        <div class="ll-btn-group" role="group" aria-label="Briefing listing view toggle">
                                            <button id="finance-briefings-v3-view-list-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="List View" aria-label="List View">
                                                <span class="material-symbols-outlined ll-btn__icon">menu</span>
                                            </button>
                                            <button id="finance-briefings-v3-view-grid-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="Grid View" aria-label="Grid View">
                                                <span class="material-symbols-outlined ll-btn__icon">grid_view</span>
                                            </button>
                                        </div>
                                        <button id="finance-briefings-v3-sort-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Sort</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-briefings-v3-sort-menu" class="ll-dropdown__menu hidden"></div>
                                    </div>
                                </div>
                            </div>
                            <div id="finance-briefings-v3-table-host" class="ll-listing-module-content-host ll-listing-module-table-host"></div>
                            <div id="finance-briefings-v3-grid-host" class="ll-listing-module-content-host ll-listing-module-grid-host"></div>
                        </div>
                    </div>

                    <div id="stories-tab-content" class="workspace-tab-content ll-tab-panel hidden">
                        <div id="finance-stories-v4" class="ll-listing-module">
                            <div class="ll-listing-module-header">
                                <div class="ll-listing-module-header__top">
                                    <div class="ll-listing-module-header__title-wrap">
                                        <div class="ll-listing-module-header__title">Stories</div>
                                    </div>
                                    <div class="ll-listing-module-header__actions">
                                        <div class="ll-input-with-left-icon ll-listing-module-search-input">
                                            <div class="ll-input-with-left-icon__left ll-input-with-left-icon__icon"><span class="material-symbols-outlined">search</span></div>
                                            <input id="finance-stories-v4-search-input" type="text" class="ll-input ll-input--search ll-input-with-left-icon__input" placeholder="Search stories...">
                                        </div>
                                        <button id="finance-stories-v4-create-btn" type="button" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Create Story
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-listing-module-header__toolbar">
                                    <div class="ll-listing-module-header__toolbar-start">
                                        <button id="finance-stories-v4-status-filter-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Status</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-stories-v4-status-filter-menu" class="ll-dropdown__menu hidden right-auto overflow-y-auto"></div>
                                        <button id="finance-stories-v4-clear-filters-btn" type="button" class="ll-btn ll-btn--outline-negative ll-listing-module__clear-filters hidden">Clear All Filters</button>
                                    </div>
                                    <div class="ll-listing-module-header__toolbar-end">
                                        <div class="ll-btn-group" role="group" aria-label="Story listing view toggle">
                                            <button id="finance-stories-v4-view-list-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="List View" aria-label="List View">
                                                <span class="material-symbols-outlined ll-btn__icon">menu</span>
                                            </button>
                                            <button id="finance-stories-v4-view-grid-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="Grid View" aria-label="Grid View">
                                                <span class="material-symbols-outlined ll-btn__icon">grid_view</span>
                                            </button>
                                        </div>
                                        <button id="finance-stories-v4-sort-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Sort</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-stories-v4-sort-menu" class="ll-dropdown__menu hidden right-auto overflow-y-auto"></div>
                                    </div>
                                </div>
                            </div>
                            <div id="finance-stories-v4-grid-host" class="ll-listing-module-content-host ll-listing-module-grid-host"></div>
                            <div id="finance-stories-v4-table-host" class="ll-listing-module-content-host ll-listing-module-table-host"></div>
                        </div>
                    </div>

                    <div id="dashboards-tab-content" class="workspace-tab-content ll-tab-panel hidden">
                        <div id="finance-dashboards-v4" class="ll-listing-module">
                            <div class="ll-listing-module-header">
                                <div class="ll-listing-module-header__top">
                                    <div class="ll-listing-module-header__title-wrap">
                                        <div class="ll-listing-module-header__title">Dashboards</div>
                                    </div>
                                    <div class="ll-listing-module-header__actions">
                                        <div class="ll-input-with-left-icon ll-listing-module-search-input">
                                            <div class="ll-input-with-left-icon__left ll-input-with-left-icon__icon"><span class="material-symbols-outlined">search</span></div>
                                            <input id="finance-dashboards-v4-search-input" type="text" class="ll-input ll-input--search ll-input-with-left-icon__input" placeholder="Search dashboards...">
                                        </div>
                                        <button id="finance-dashboards-v4-create-btn" type="button" class="ll-btn ll-btn--outline-default">
                                            <span class="material-symbols-outlined ll-btn__icon">add</span>
                                            Create Dashboard
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-listing-module-header__toolbar">
                                    <div class="ll-listing-module-header__toolbar-start">
                                        <button id="finance-dashboards-v4-status-filter-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Status</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-dashboards-v4-status-filter-menu" class="ll-dropdown__menu hidden right-auto overflow-y-auto"></div>
                                        <button id="finance-dashboards-v4-clear-filters-btn" type="button" class="ll-btn ll-btn--outline-negative ll-listing-module__clear-filters hidden">Clear All Filters</button>
                                    </div>
                                    <div class="ll-listing-module-header__toolbar-end">
                                        <div class="ll-btn-group" role="group" aria-label="Dashboard listing view toggle">
                                            <button id="finance-dashboards-v4-view-list-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="List View" aria-label="List View">
                                                <span class="material-symbols-outlined ll-btn__icon">menu</span>
                                            </button>
                                            <button id="finance-dashboards-v4-view-grid-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="Grid View" aria-label="Grid View">
                                                <span class="material-symbols-outlined ll-btn__icon">grid_view</span>
                                            </button>
                                        </div>
                                        <button id="finance-dashboards-v4-sort-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Sort</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-dashboards-v4-sort-menu" class="ll-dropdown__menu hidden right-auto overflow-y-auto"></div>
                                    </div>

                        </div>
                    </div>

                    <div id="whiteboards-tab-content" class="workspace-tab-content ll-tab-panel hidden">
                        <div id="finance-whiteboards-v4" class="ll-listing-module">
                            <div class="ll-listing-module-header">
                                <div class="ll-listing-module-header__top">
                                    <div class="ll-listing-module-header__title-wrap">

                                    <div class="ll-listing-module-header__actions">

                                            Create Whiteboard
                                        </button>
                                    </div>
                                </div>
                                <div class="ll-listing-module-header__toolbar">
                                    <div class="ll-listing-module-header__toolbar-start">
                                        <button id="finance-whiteboards-v4-status-filter-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Status</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>

                                        <button id="finance-whiteboards-v4-clear-filters-btn" type="button" class="ll-btn ll-btn--outline-negative ll-listing-module__clear-filters hidden">Clear All Filters</button>
                                    </div>

                                            <button id="finance-whiteboards-v4-view-list-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="List View" aria-label="List View">

                                            </button>
                                        </div>
                                        <button id="finance-whiteboards-v4-sort-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Sort</span>

                                        <div id="finance-whiteboards-v4-sort-menu" class="ll-dropdown__menu hidden right-auto overflow-y-auto"></div>

                            <div id="finance-whiteboards-v4-grid-host" class="ll-listing-module-content-host ll-listing-module-grid-host"></div>
                            <div id="finance-whiteboards-v4-table-host" class="ll-listing-module-content-host ll-listing-module-table-host"></div>
                        </div>

                    </div>

                    <div id="command-rooms-tab-content" class="workspace-tab-content ll-tab-panel hidden">
                        <div id="finance-command-rooms-v5" class="ll-listing-module">
                            <div class="ll-listing-module-header">
                                <div class="ll-listing-module-header__top">
                                    <div class="ll-listing-module-header__title-wrap">
                                        <div class="ll-listing-module-header__title">Command Rooms</div>

                                    <div class="ll-listing-module-header__actions">
                                        <div class="ll-input-with-left-icon ll-listing-module-search-input">
                                            <div class="ll-input-with-left-icon__left ll-input-with-left-icon__icon"><span class="material-symbols-outlined">search</span></div>
                                            <input id="finance-command-rooms-v5-search-input" type="text" class="ll-input ll-input--search ll-input-with-left-icon__input" placeholder="Search command rooms...">
                                        </div>
                                        <button id="finance-command-rooms-v5-create-btn" type="button" class="ll-btn ll-btn--outline-default">

                                <div class="ll-listing-module-header__toolbar">
                                    <div class="ll-listing-module-header__toolbar-start">
                                        <button id="finance-command-rooms-v5-status-filter-btn" class="ll-btn ll-btn--outline-default">
                                            <span class="ll-dropdown__selected-value">Status</span>
                                            <span class="material-symbols-outlined ll-dropdown__button-chevron">expand_more</span>
                                        </button>
                                        <div id="finance-command-rooms-v5-status-filter-menu" class="ll-dropdown__menu hidden right-auto overflow-y-auto"></div>
                                        <button id="finance-command-rooms-v5-clear-filters-btn" type="button" class="ll-btn ll-btn--outline-negative ll-listing-module__clear-filters hidden">Clear All Filters</button>

                                    <div class="ll-listing-module-header__toolbar-end">

                                                <span class="material-symbols-outlined ll-btn__icon">menu</span>

                                            <button id="finance-command-rooms-v5-view-grid-btn" type="button" class="ll-btn ll-btn--outline-default ll-btn--icon-only" title="Grid View" aria-label="Grid View">
                                                <span class="material-symbols-outlined ll-btn__icon">grid_view</span>

        // Utility for toggling dropdowns with mutual exclusivity
        function setupDropdown(buttonId, menuId, otherMenuId) {
            const button = document.getElementById(buttonId);
            const menu = document.getElementById(menuId);
            const otherMenu = otherMenuId ? document.getElementById(otherMenuId) : null;

            if (button && menu) {
                button.addEventListener('click', (event) => {
                    event.stopPropagation(); // Prevent document click from immediately closing
                    const wasHidden = menu.classList.contains('hidden');

                    // Close the other dropdown if it exists
                    if (otherMenu && !otherMenu.classList.contains('hidden')) {
                        otherMenu.classList.add('hidden');
                    }

                    // Toggle this dropdown
                    if (wasHidden) {
                        menu.classList.remove('hidden');
                    } else {
                        menu.classList.add('hidden');
                    }
                });

                // Close dropdown if clicked outside
                document.addEventListener('click', (event) => {
                    if (!button.contains(event.target) && !menu.contains(event.target)) {
                        menu.classList.add('hidden');
                    }
                });
            }
        }

        // Setup User Dropdown (with reference to Create dropdown)
        setupDropdown('user-dropdown-button', 'user-dropdown-menu', 'create-dropdown-menu');

        // Simulated feedback helper routed through the reusable Toast pattern.
        function alertMessage(message, type = "info") {
            const components = window.LlumenComponents;
            const toastStateByType = {
                info: 'info',
                success: 'positive',
                error: 'negative',
                warning: 'warning',
                positive: 'positive',
                negative: 'negative',
                loading: 'loading'
            };
            const normalizedType = String(type || 'info').toLowerCase();
            const toastState = toastStateByType[normalizedType] || 'info';
            const safeMessage = String(message == null ? '' : message).trim() || 'Action completed.';

            if (components && typeof components.createToast === 'function') {
                components.createToast({
                    state: toastState,
                    message: safeMessage,
                    position: 'bottom-left',
                    duration: 4000,
                    dismissible: true
                });
                return;
            }

            // Fallback for environments where reusable components are unavailable.
            console.warn('[toast unavailable]', safeMessage);
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function sanitizeIdToken(value) {
            const normalized = String(value == null ? '' : value)
                .toLowerCase()
                .replace(/[^a-z0-9_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
            return normalized || 'item';
        }

        // Tooltip functionality for "Create Workspace" button

        let tooltipElement = null;
        let tooltipTimeout = null;

        function showTooltip(button, text) {
            if (tooltipElement) {
                tooltipElement.remove();
                tooltipElement = null;
            }

            tooltipElement = document.createElement('div');
            tooltipElement.className = 'tooltip';
            tooltipElement.textContent = text;
            document.body.appendChild(tooltipElement);

            const rect = button.getBoundingClientRect();
            const scrollX = window.scrollX || window.pageXOffset;
            const scrollY = window.scrollY || window.pageYOffset;

            tooltipElement.style.left = `${rect.left + scrollX}px`;
            tooltipElement.style.top = `${rect.top + scrollY - tooltipElement.offsetHeight - 8}px`;

            requestAnimationFrame(() => {
                tooltipElement.classList.add('show');
            });
        }

        function hideTooltip() {
            if (tooltipTimeout) {
                clearTimeout(tooltipTimeout);
                tooltipTimeout = null;
            }
            if (tooltipElement) {
                tooltipElement.classList.remove('show');
                tooltipElement.addEventListener('transitionend', function handler() {
                    if (tooltipElement && !tooltipElement.classList.contains('show')) {
                        tooltipElement.remove();
                        tooltipElement = null;
                        this.removeEventListener('transitionend', handler);
                    }
                });
            }
        }

            menu.dataset.dropdownId = button.dataset.dropdownId;

                if (openDropdownMenu && openDropdownMenu !== menu) {

                const wasHidden = menu.classList.contains('hidden');

                    menu.style.position = 'absolute';

                }
            });

            menu.addEventListener('click', (event) => {

            });

            // Close dropdown when menu items are clicked

            function sortStories(sortType) {

                if (!tbody) return;

                const rows = Array.from(tbody.querySelectorAll('tr'));

                // Store original order if not already stored
                if (originalStoryOrder.length === 0 && rows.length > 0) {
                    originalStoryOrder = rows.map((row, index) => ({ row, index }));
                }

                if (sortType === 'default') {
                    // Restore original order
                    if (originalStoryOrder.length > 0) {
                        originalStoryOrder.sort((a, b) => a.index - b.index);
                        originalStoryOrder.forEach(({ row }) => tbody.appendChild(row));
                    }
                    return;
                }

                rows.sort((a, b) => {
                    switch (sortType) {
                        case 'last-updated':
                            // Sort by Last Updated (column 4)
                            const timeA = parseTime(a.querySelector('td:nth-child(4)')?.textContent.trim() || '');
                            const timeB = parseTime(b.querySelector('td:nth-child(4)')?.textContent.trim() || '');
                            return timeA - timeB; // Most recent first (descending)

                        case 'title-asc':
                            // Sort by Title A-Z (column 1)
                            const titleA = a.querySelector('td:nth-child(1) .text-sm.font-medium')?.textContent.trim() || '';
                            const titleB = b.querySelector('td:nth-child(1) .text-sm.font-medium')?.textContent.trim() || '';
                            return titleA.localeCompare(titleB);

                        case 'title-desc':
                            // Sort by Title Z-A (column 1)
                            const titleAZ = a.querySelector('td:nth-child(1) .text-sm.font-medium')?.textContent.trim() || '';
                            const titleBZ = b.querySelector('td:nth-child(1) .text-sm.font-medium')?.textContent.trim() || '';
                            return titleBZ.localeCompare(titleAZ);

                        default:
                            return 0;
                    }
                });

                // Re-append rows in sorted order
                rows.forEach(row => tbody.appendChild(row));

            function parseTime(timeString) {
                // Handle "Yesterday" as a special case
                if (timeString.toLowerCase().includes('yesterday')) {
                    return 24 * 60 * 60 * 1000; // 1 day ago
                }

                // Convert time strings like "2 hours ago", "1 day ago", "3 days ago", "1 week ago" to milliseconds
                const timeMatch = timeString.match(/(\d+)\s+(hour|day|week)s?\s+ago/i);
                if (!timeMatch) return 0;

                const value = parseInt(timeMatch[1]);
                const unit = timeMatch[2].toLowerCase();

                const multipliers = {
                    'hour': 60 * 60 * 1000,
                    'day': 24 * 60 * 60 * 1000,
                    'week': 7 * 24 * 60 * 60 * 1000
                };

                return value * (multipliers[unit] || 0);

                    const searchTerm = event.target.value.toLowerCase();
                    filterCommandRooms();

                    // Show/hide clear button based on input value
                    if (searchTerm.length > 0) {
                        commandRoomsSearchClear.style.display = 'flex';
                    } else {
                        commandRoomsSearchClear.style.display = 'none';
                    }
                });

                // Clear button functionality
                commandRoomsSearchClear.addEventListener('click', () => {
                    commandRoomsSearchInput.value = '';
                    commandRoomsSearchClear.style.display = 'none';
                    filterCommandRooms();
                    commandRoomsSearchInput.focus();
                });
            }

            function filterCommandRooms() {
                const searchTerm = commandRoomsSearchInput ? commandRoomsSearchInput.value.toLowerCase() : '';

                // Get grid items and list items
                const gridItems = document.querySelectorAll('.command-room-card-container');
                const listRows = document.querySelectorAll('#command-rooms-content tr');

                const noMatchesMessageGrid = document.getElementById('no-command-room-matches-message-grid');
                const noMatchesMessageList = document.getElementById('no-command-room-matches-message');

                let visibleCount = 0;

                // Helper to check match
                const checkMatch = (roomName, status) => {
                    const matchesSearch = searchTerm === '' || roomName.toLowerCase().includes(searchTerm);
                    const matchesStatus = commandRoomFilterStates.status.length === 0 || commandRoomFilterStates.status.includes(status);
                    return matchesSearch && matchesStatus;
                };

                // Filter Grid Items
                gridItems.forEach(item => {
                    const roomName = item.querySelector('h3').textContent;
                    const statusBadge = item.querySelector('.rounded-full');
                    const status = statusBadge ? statusBadge.textContent.trim() : '';

                    const shouldShow = checkMatch(roomName, status);
                    item.style.display = shouldShow ? '' : 'none';
                    if (shouldShow) visibleCount++;
                });

                // Filter List Rows
                listRows.forEach(row => {
                    const roomName = row.querySelector('.text-sm.font-medium.text-white').textContent;
                    const statusBadge = row.querySelector('.rounded-full');
                    const status = statusBadge ? statusBadge.textContent.trim() : '';

                    const shouldShow = checkMatch(roomName, status);
                    row.style.display = shouldShow ? '' : 'none';
                });

                // Show/hide no matches message
                if ((searchTerm.length > 0 || commandRoomFilterStates.status.length > 0) && visibleCount === 0) {
                    if (noMatchesMessageGrid) noMatchesMessageGrid.classList.remove('hidden');
                    if (noMatchesMessageList) noMatchesMessageList.classList.remove('hidden');
                } else {
                    if (noMatchesMessageGrid) noMatchesMessageGrid.classList.add('hidden');
                    if (noMatchesMessageList) noMatchesMessageList.classList.add('hidden');
                }
            }

            // Command Rooms filter functionality
            const commandRoomFilterButtons = ['command-room-status-filter-btn'];
            const commandRoomFilterDropdowns = ['command-room-status-filter-dropdown'];

            // Initialize command room filter states
            const commandRoomFilterStates = {
                status: []
            };

            // Toggle command room filter dropdowns
            commandRoomFilterButtons.forEach((btnId, index) => {
                const button = document.getElementById(btnId);
                if (button) {
                    const dropdown = document.getElementById(commandRoomFilterDropdowns[index]);

                    button.addEventListener('click', (event) => {
                        event.stopPropagation();

                        // Close other dropdowns
                        commandRoomFilterDropdowns.forEach((dropdownId, i) => {
                            if (i !== index) {
                                const otherDropdown = document.getElementById(dropdownId);
                                if (otherDropdown) {
                                    otherDropdown.classList.add('hidden');
                                }
                            }
                        });

                        dropdown.classList.toggle('hidden');
                    });
                }
            });

            // Handle command room filter checkbox changes
            document.querySelectorAll('#command-room-status-filter-dropdown input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    updateCommandRoomFilterState('status', checkbox.value, checkbox.checked);
                    updateCommandRoomFilterButton('command-room-status-filter-btn', commandRoomFilterStates.status);
                    filterCommandRooms();
                });
            });

            function updateCommandRoomFilterState(filterType, value, checked) {
                if (checked) {
                    if (!commandRoomFilterStates[filterType].includes(value)) {
                        commandRoomFilterStates[filterType].push(value);
                    }
                } else {
                    commandRoomFilterStates[filterType] = commandRoomFilterStates[filterType].filter(item => item !== value);
                }
            }

            function updateCommandRoomFilterButton(buttonId, selectedValues) {
                const button = document.getElementById(buttonId);
                if (!button) return;

                const buttonText = button.querySelector('.selected-value');
                const clearBtnId = 'command-room-status-clear-btn';
                const defaultText = 'Status';

                const clearBtn = document.getElementById(clearBtnId);

                if (selectedValues.length === 0) {
                    buttonText.textContent = defaultText;
                    if (clearBtn) clearBtn.classList.add('hidden');
                } else {
                    buttonText.textContent = selectedValues.join(', ');
                    if (clearBtn) clearBtn.classList.remove('hidden');
                }

                // Update "Clear All Filters" button visibility
                updateCommandRoomClearAllFiltersButton();
            }

            function updateCommandRoomClearAllFiltersButton() {
                const clearAllBtn = document.getElementById('clear-all-command-room-filters-btn');
                if (!clearAllBtn) return;

                const hasAnyFilters = commandRoomFilterStates.status.length > 0;

                if (hasAnyFilters) {
                    clearAllBtn.classList.remove('hidden');
                } else {
                    clearAllBtn.classList.add('hidden');
                }
            }

            // Clear individual command room filter buttons
            const commandRoomStatusClearBtn = document.getElementById('command-room-status-clear-btn');
            if (commandRoomStatusClearBtn) {
                commandRoomStatusClearBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    clearCommandRoomFilter('status');
                });
            }

            // Clear all command room filters button
            const clearAllCommandRoomFiltersBtn = document.getElementById('clear-all-command-room-filters-btn');
            if (clearAllCommandRoomFiltersBtn) {
                clearAllCommandRoomFiltersBtn.addEventListener('click', () => {
                    clearAllCommandRoomFilters();
                });
            }

            function clearCommandRoomFilter(filterType) {
                // Clear the filter state
                commandRoomFilterStates[filterType] = [];

                // Uncheck all checkboxes in the dropdown
                document.querySelectorAll(`#command-room-${filterType}-filter-dropdown input[type="checkbox"]`).forEach(checkbox => {
                    checkbox.checked = false;
                });

                // Update the button text
                updateCommandRoomFilterButton(`command-room-${filterType}-filter-btn`, []);

                // Close the dropdown
                const dropdown = document.getElementById(`command-room-${filterType}-filter-dropdown`);
                if (dropdown) {
                    dropdown.classList.add('hidden');
                }

                // Re-filter
                filterCommandRooms();
            }

            function clearAllCommandRoomFilters() {
                // Clear all filter states
                Object.keys(commandRoomFilterStates).forEach(filterType => {
                    commandRoomFilterStates[filterType] = [];

                    // Uncheck all checkboxes in each dropdown
                    document.querySelectorAll(`#command-room-${filterType}-filter-dropdown input[type="checkbox"]`).forEach(checkbox => {
                        checkbox.checked = false;
                    });

                    // Update each button text
                    updateCommandRoomFilterButton(`command-room-${filterType}-filter-btn`, []);
                });

                // Close all filter dropdowns
                commandRoomFilterDropdowns.forEach(dropdownId => {
                    const dropdown = document.getElementById(dropdownId);
                    if (dropdown) {
                        dropdown.classList.add('hidden');
                    }
                });

                // Re-filter
                filterCommandRooms();
            }

            // Close command room filter dropdowns when clicking outside
            document.addEventListener('click', (event) => {
                if (event.target.type === 'checkbox' || event.target.closest('label')) {
                    return;
                }

                if (!event.target.closest('[id^="command-room-status-filter-"]') && !event.target.closest('button[id*="filter"]')) {
                    commandRoomFilterDropdowns.forEach(dropdownId => {
                        const dropdown = document.getElementById(dropdownId);
                        if (dropdown) {
                            dropdown.classList.add('hidden');
                        }
                    });
                }
            });

            // Command Rooms Sort Functionality
            const commandRoomSortBtn = document.getElementById('command-room-sort-btn');
            const commandRoomSortDropdown = document.getElementById('command-room-sort-dropdown');
            let currentCommandRoomSort = 'default';

            if (commandRoomSortBtn && commandRoomSortDropdown) {
                // Toggle sort dropdown
                commandRoomSortBtn.addEventListener('click', (event) => {
                    event.stopPropagation();

                    // Close filter dropdowns
                    commandRoomFilterDropdowns.forEach(dropdownId => {
                        const dropdown = document.getElementById(dropdownId);
                        if (dropdown) {
                            dropdown.classList.add('hidden');
                        }
                    });

                    commandRoomSortDropdown.classList.toggle('hidden');
                });

                // Handle sort option clicks
                commandRoomSortDropdown.querySelectorAll('a[data-sort]').forEach(link => {
                    link.addEventListener('click', (event) => {
                        event.preventDefault();
                        event.stopPropagation();

                        const sortType = link.dataset.sort;
                        currentCommandRoomSort = sortType;

                        // Remove active class from all links
                        commandRoomSortDropdown.querySelectorAll('a[data-sort]').forEach(l => {
                            l.classList.remove('active');
                        });
                        // Add active class to selected link
                        link.classList.add('active');

                        // Update button text
                        const sortValueSpan = commandRoomSortBtn.querySelector('.sort-selected-value');
                        if (sortValueSpan) {
                            sortValueSpan.textContent = sortType === 'default' ? 'Sort' : link.textContent.trim();
                        }

                        // Show/hide clear button based on selection
                        const sortClearBtn = document.getElementById('command-room-sort-clear-btn');
                        if (sortClearBtn) {
                            if (sortType === 'default') {
                                sortClearBtn.classList.add('hidden');
                            } else {
                                sortClearBtn.classList.remove('hidden');
                            }
                        }

                        // Close dropdown
                        commandRoomSortDropdown.classList.add('hidden');

                        // Apply sort
                        sortCommandRooms(sortType);
                    });
                });

                // Handle clear button click
                const sortClearBtn = document.getElementById('command-room-sort-clear-btn');
                if (sortClearBtn) {
                    sortClearBtn.addEventListener('click', (event) => {
                        event.stopPropagation();
                        // Reset to default
                        currentCommandRoomSort = 'default';
                        // Remove active class
                        commandRoomSortDropdown.querySelectorAll('a[data-sort]').forEach(l => {
                            l.classList.remove('active');
                        });
                        const defaultLink = commandRoomSortDropdown.querySelector('a[data-sort="default"]');
                        if (defaultLink) defaultLink.classList.add('active');

                        // Update text
                        const sortValueSpan = commandRoomSortBtn.querySelector('.sort-selected-value');
                        if (sortValueSpan) sortValueSpan.textContent = 'Sort';

                        // Hide clear button
                        sortClearBtn.classList.add('hidden');

                        // Apply default sort
                        sortCommandRooms('default');
                    });
                }

                // Close sort dropdown when clicking outside
                document.addEventListener('click', (event) => {
                    if (!commandRoomSortBtn.contains(event.target) && !commandRoomSortDropdown.contains(event.target)) {
                        commandRoomSortDropdown.classList.add('hidden');
                    }
                });
            }

            // Store original order for default sort
            let originalCommandRoomOrderGrid = [];
            let originalCommandRoomOrderList = [];

            function sortCommandRooms(sortType) {
                // Sort Grid
                const gridContainer = document.getElementById('command-rooms-grid-content');
                if (gridContainer) {
                    const items = Array.from(gridContainer.children);
                    if (originalCommandRoomOrderGrid.length === 0 && items.length > 0) {
                        originalCommandRoomOrderGrid = items.map((item, index) => ({ item, index }));
                    }

                    if (sortType === 'default') {
                        if (originalCommandRoomOrderGrid.length > 0) {
                            originalCommandRoomOrderGrid.sort((a, b) => a.index - b.index);
                            originalCommandRoomOrderGrid.forEach(({ item }) => gridContainer.appendChild(item));
                        }
                    } else {
                        items.sort((a, b) => {
                            const titleA = a.querySelector('h3').textContent.trim();
                            const titleB = b.querySelector('h3').textContent.trim();
                            // For simplicity only implementing Title sort for now in this iteration if needed
                            // or verify if I need to fetch times.
                            // Getting time might require parsing "2 hours ago" etc.
                            // For now implementing Title A-Z / Z-A

                            if (sortType === 'title-asc') return titleA.localeCompare(titleB);
                            if (sortType === 'title-desc') return titleB.localeCompare(titleA);
                            return 0;
                        });
                        items.forEach(item => gridContainer.appendChild(item));
                    }
                }

                // Sort List
                const listBody = document.getElementById('command-rooms-content');
                if (listBody) {
                    const rows = Array.from(listBody.querySelectorAll('tr'));
                    if (originalCommandRoomOrderList.length === 0 && rows.length > 0) {
                        originalCommandRoomOrderList = rows.map((row, index) => ({ row, index }));
                    }

                    if (sortType === 'default') {
                        if (originalCommandRoomOrderList.length > 0) {
                            originalCommandRoomOrderList.sort((a, b) => a.index - b.index);
                            originalCommandRoomOrderList.forEach(({ row }) => listBody.appendChild(row));
                        }
                    } else {
                        rows.sort((a, b) => {
                            const titleA = a.querySelector('.text-sm.font-medium.text-white').textContent.trim();
                            const titleB = b.querySelector('.text-sm.font-medium.text-white').textContent.trim();

                            if (sortType === 'title-asc') return titleA.localeCompare(titleB);
                            if (sortType === 'title-desc') return titleB.localeCompare(titleA);
                            return 0;
                        });
                        rows.forEach(row => listBody.appendChild(row));
                    }
                }
            }

            function switchCommandRoomsView(view) {

                    gridBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    listBtn.classList.remove('bg-red-600');
                    listBtn.classList.add('bg-gray-700', 'hover:bg-gray-600');

            function initializeWorkspaceConfigSelectionDropdowns() {
                if (!workspaceConfigComponents || typeof workspaceConfigComponents.initializePortaledDropdown !== 'function') return;
                const configs = [
                    ['workspace-config-v2-settings-invite-btn', 'workspace-config-v2-settings-invite-menu'],
                    ['workspace-config-v2-settings-create-btn', 'workspace-config-v2-settings-create-menu'],
                    ['workspace-config-v2-settings-share-btn', 'workspace-config-v2-settings-share-menu'],
                    ['workspace-config-v2-member-john-role-btn', 'workspace-config-v2-member-john-role-menu'],
                    ['workspace-config-v2-member-jane-role-btn', 'workspace-config-v2-member-jane-role-menu'],
                    ['workspace-config-v2-member-mike-role-btn', 'workspace-config-v2-member-mike-role-menu'],
                    ['workspace-config-v2-member-sarah-role-btn', 'workspace-config-v2-member-sarah-role-menu']
                ];
                configs.forEach(([buttonId, menuId]) => {
                    const buttonEl = document.getElementById(buttonId);
                    if (!buttonEl || buttonEl.dataset.workspaceConfigDropdownBound === 'true') return;
                    workspaceConfigComponents.initializePortaledDropdown({
                        buttonId,
                        menuId,
                        align: 'right',
                        selectedValueSelector: '.ll-dropdown__selected-value',
                        onValueChange: ({ value }) => {
                            const target = buttonEl.querySelector('.ll-dropdown__selected-value');
                            const resolvedValue = String(value || '').trim();
                            if (target) target.textContent = resolvedValue;
                            const menu = document.getElementById(menuId);
                            if (menu) {
                                menu.querySelectorAll('[data-value]').forEach((item) => {
                                    const isActive = String(item.getAttribute('data-value') || '').trim() === resolvedValue;
                                    item.classList.toggle('ll-active', isActive);
                                });
                            }
                        }
                    });
                    buttonEl.dataset.workspaceConfigDropdownBound = 'true';
                });
            }

                    if (!button || button.dataset.workspaceConfigActionBound === 'true') return;
                    button.dataset.workspaceConfigActionBound = 'true';
                    button.addEventListener('click', () => alertMessage(message, 'info'));
                });
            }

            function ensureWorkspaceConfigModal() {
                if (workspaceConfigModalController) return workspaceConfigModalController;
                if (!workspaceConfigComponents || typeof workspaceConfigComponents.initializeModal !== 'function') return null;
                workspaceConfigModalController = workspaceConfigComponents.initializeModal({
                    id: 'workspace-config-v2-modal',
                    title: 'Finance',
                    titleIcon: 'workspaces',
                    titleMeta: ['<span class="ll-chip ll-chip--outline-positive"><span class="ll-chip__label">Active</span></span>'],
                    width: '95rem',
                    fullHeight: true,
                    bodyPadding: false,
                    bodyScrollable: false,
                    openOnInit: false,
                    bodyContent: getWorkspaceConfigModalBodyMarkup(),
                    onOpen: () => {
                        initializeWorkspaceConfigSelectionDropdowns();
                        initializeWorkspaceConfigListings();
                    }
                });

                workspaceConfigPrimaryTabsController = workspaceConfigComponents.initializeTabs({
                    tabButtonSelector: '#workspace-config-v2-modal-body [data-config-tab]',
                    tabContentSelector: '#workspace-config-v2-modal-body .workspace-config-v2-tab-panel',
                    tabValueDatasetKey: 'configTab',
                    tabContentIdPrefix: 'workspace-config-v2-',
                    tabContentIdSuffix: '-tab',
                    activeClassName: 'll-active',
                    initialTab: 'general',
                    onTabChange: (_tabName, context) => {
                        const buttons = document.querySelectorAll('#workspace-config-v2-modal-body [data-config-tab]');
                        buttons.forEach((button) => {
                            const isActive = context && context.selectedTabButton === button;
                            button.classList.toggle('ll-btn--primary', Boolean(isActive));
                            button.classList.toggle('ll-btn--flat-default', !isActive);
                        });
                    }
                });
                workspaceConfigDataSourcesTabsController = workspaceConfigComponents.initializeTabs({
                    tabButtonSelector: '#workspace-config-v2-modal-body [data-sources-tab]',
                    tabContentSelector: '#workspace-config-v2-modal-body .workspace-config-v2-sources-panel',
                    tabValueDatasetKey: 'sourcesTab',
                    tabContentIdPrefix: 'workspace-config-v2-sources-',
                    tabContentIdSuffix: '-panel',
                    activeClassName: 'll-active',
                    initialTab: 'databases'
                });

                return workspaceConfigModalController;
            }

            function openWorkspaceConfigModal(tabName = 'general') {
                const modal = ensureWorkspaceConfigModal();
                if (!modal) return;
                modal.open();
                if (workspaceConfigPrimaryTabsController && typeof workspaceConfigPrimaryTabsController.switchTab === 'function') {
                    workspaceConfigPrimaryTabsController.switchTab(String(tabName || 'general'));
                }
            }

            function closeWorkspaceConfigModal() {
                if (!workspaceConfigModalController || typeof workspaceConfigModalController.close !== 'function') return;
                workspaceConfigModalController.close('programmatic');
            }

            window.openWorkspaceConfigModal = openWorkspaceConfigModal;
            window.closeWorkspaceConfigModal = closeWorkspaceConfigModal;
            // ========== URL HASH TAB SWITCHING ==========
            function handleHashChange() {
                // Parse hash: #?tab=command-rooms
                const hash = window.location.hash;
                if (hash && hash.includes('?tab=')) {
                    try {
                        const rawTabName = hash.split('?tab=')[1];
                        const tabAliases = {
                            agents: 'workflows',
                            wofkflows: 'workflows'
                        };
                        const tabName = tabAliases[rawTabName] || rawTabName;
                        if (tabName) {
                            console.log('Switching to tab from URL:', tabName);
                            // Ensure the tab exists before switching
                            const tabButton = document.querySelector(`[data-internal-tab="${tabName}"]`);
                            if (tabButton && typeof switchInternalTab === 'function') {
                                switchInternalTab(tabName);
                            }
                        }
                    } catch (e) {
                        console.error('Error parsing URL hash for tab switching:', e);
                    }
                }
            }

            // Check on load
            handleHashChange();

            // Listen for hash changes
            window.addEventListener('hashchange', handleHashChange);
        });
    </script>
</body>

</html>
