<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llumen Prototype</title>
    <link rel="stylesheet" href="../css/tailwind.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="dashboard-builder-root" class="ll-content-builder ll-content-builder--viewport" data-ll-builder-mode="edit">
        <header class="ll-content-builder__header">
            <div class="ll-content-builder__header-inner">
                <div class="ll-content-builder__header-row">
                    <a href="../workspaces/finance.html" class="ll-icon-btn ll-icon-btn--circle ll-icon-btn--outline" aria-label="Back to workspace">
                        <span class="material-symbols-outlined">arrow_back_ios_new</span>
                    </a>
                    <input
                        type="text"
                        class="ll-input ll-content-builder__title-input hidden"
                        data-ll-builder-title-input
                        placeholder="Dashboard title">
                    <div class="ll-content-builder__title-text ll-content-builder__editable-title font-medium text-lg" contenteditable="true" data-dashboard-title-editor data-ll-builder-visible="edit"></div>
                    <h1 class="ll-content-builder__title-text" data-ll-builder-title-text data-ll-builder-visible="view"></h1>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined">workspaces</span>
                        <span data-ll-builder-owner></span>
                    </div>
                    <div class="ll-chip ll-chip--outline-default" data-ll-builder-status-chip>
                        <span class="ll-chip__label" data-ll-builder-status-label></span>
                    </div>
                    <div>
                        <button
                            type="button"
                            id="dashboard-builder-header-menu-trigger"
                            class="ll-icon-btn ll-icon-btn--circle ll-icon-btn--outline"
                            data-ll-builder-header-menu-trigger
                            aria-label="Dashboard actions">
                            <span class="material-symbols-outlined ll-icon-btn__icon">more_vert</span>
                        </button>
                        <div id="dashboard-builder-header-menu" class="hidden" data-ll-builder-header-menu>
                            <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="toggle-mode" data-ll-builder-action="toggle-mode">
                                <span data-ll-builder-mode-toggle-label>Switch to View Mode</span>
                            </button>
                            <div class="ll-dropdown__group-divider"></div>
                            <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="publish">Publish</button>
                            <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="share">Share</button>
                            <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="configure">Configure</button>
                            <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus ll-dropdown__item--danger" data-value="delete">Delete</button>
                        </div>
                    </div>
                </div>

                <div class="ll-content-builder__header-row ll-content-builder__header-row--no-x-padding">
                    <section class="ll-content-builder__subnav">
                        <div id="dashboard-sub-content-nav" class="ll-carousel" data-ll-builder-subnav></div>
                    </section>
                </div>

                <div class="ll-content-builder__header-row" data-ll-builder-visible="edit">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined ll-text-muted" aria-hidden="true">dark_mode</span>
                        <div class="ll-btn-group" role="group" aria-label="Theme">
                            <button type="button" class="ll-btn ll-btn--sm ll-btn--primary" data-dashboard-theme="dark" aria-pressed="true">Dark</button>
                            <button type="button" class="ll-btn ll-btn--sm ll-btn--outline-default" data-dashboard-theme="light" aria-pressed="false">Light</button>
                        </div>
                    </div>
                    <span class="h-8 border-l ll-border-divider"></span>
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined ll-text-muted" aria-hidden="true">view_module</span>
                        <div id="dashboard-grid-col-count-group" class="ll-btn-group" role="group" aria-label="Grid columns">
                            <button type="button" class="ll-btn ll-btn--sm ll-btn--outline-default" data-dashboard-grid-cols="4" aria-pressed="false">4</button>
                            <button type="button" class="ll-btn ll-btn--sm ll-btn--primary" data-dashboard-grid-cols="6" aria-pressed="true">6</button>
                            <button type="button" class="ll-btn ll-btn--sm ll-btn--outline-default" data-dashboard-grid-cols="8" aria-pressed="false">8</button>
                            <button type="button" class="ll-btn ll-btn--sm ll-btn--outline-default" data-dashboard-grid-cols="12" aria-pressed="false">12</button>
                        </div>
                    </div>
                    <span class="h-8 border-l ll-border-divider"></span>
                    <div class="ll-toggle__container">
                        <label class="ll-toggle flex-shrink-0">
                            <input type="checkbox" id="dashboard-filters-visibility-toggle" class="ll-toggle__input">
                            <span class="ll-toggle__slider"></span>
                        </label>
                        <label for="dashboard-filters-visibility-toggle" class="ll-toggle__label">Enable Page Filters</label>
                    </div>
                </div>
            </div>
        </header>

        <main class="ll-content-builder__main">
            <section id="dashboard-filters-section" class="px-6 py-4 border-b ll-border-divider" hidden>
                <div class="flex">
                    <button type="button" class="ll-btn ll-btn--outline-default" data-dashboard-sim-action="add-filter">
                        <span class="material-symbols-outlined ll-btn__icon">add</span>
                        Add Filter
                    </button>
                </div>
            </section>

            <section class="ll-content-builder__context" data-ll-builder-context="grid">
                <div id="dashboard-grid-host" class="ll-content-builder__grid-context-host">
                    <div id="dashboard-grid-surface" class="ll-content-builder__grid-context-surface" data-dashboard-grid-cols="6">
                        <div id="dashboard-grid-edit-guides" class="ll-grid-edit-guides rounded-md" aria-hidden="true"></div>
                    </div>
                </div>
            </section>
        </main>

        <div class="ll-content-builder__ribbon-wrap">
            <div class="ll-ribbon">
                <div class="ll-ribbon__group">
                    <a href="../index.html" class="ll-ribbon__btn ll-ribbon__btn--icon-only" aria-label="Back to home">
                        <span class="material-symbols-outlined">home</span>
                    </a>
                </div>
                <div class="ll-ribbon__divider" data-ll-builder-visible="edit"></div>
                <div class="ll-ribbon__group" data-ll-builder-visible="edit">
                    <button type="button" class="ll-ribbon__btn ll-ribbon__btn--icon-label" data-dashboard-action="open-component-browser">
                        <span class="material-symbols-outlined">add</span>
                        <span>Component</span>
                    </button>
                </div>
                <div class="ll-ribbon__divider"></div>
                <div class="ll-ribbon__group">
                    <button type="button" class="ll-ribbon__btn ll-ribbon__btn--icon-only" data-dashboard-sim-action="share" aria-label="Share">
                        <span class="material-symbols-outlined">ios_share</span>
                    </button>
                </div>
                <div class="ll-ribbon__divider"></div>
                <div class="ll-ribbon__group">
                    <button
                        type="button"
                        id="dashboard-ribbon-menu-trigger"
                        class="ll-ribbon__btn ll-ribbon__btn--icon-only"
                        aria-label="Ribbon actions">
                        <span class="material-symbols-outlined">more_vert</span>
                    </button>
                    <div id="dashboard-ribbon-menu" class="hidden">
                        <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="toggle-mode" data-ll-builder-action="toggle-mode">
                            <span data-ll-builder-mode-toggle-label>Switch to View Mode</span>
                        </button>
                        <div class="ll-dropdown__group-divider"></div>
                        <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="publish">Publish</button>
                        <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="share">Share</button>
                        <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus" data-value="configure">Configure</button>
                        <button type="button" class="ll-dropdown__item ll-dropdown__item--dismiss-mouse-focus ll-dropdown__item--danger" data-value="delete">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/llumen-sortable-engine.js"></script>
    <script src="../js/llumen-components.js"></script>
    <script src="../js/llumen-app-header.js"></script>
    <script src="../js/llumen-shader-background.js"></script>
    <script src="../js/dashboard-builder.js"></script>
</body>
</html>
